# Tech Radar — pipeline semi-automatica.
# Pesca le novità dalle fonti, le sintetizza con Gemini e APRE UNA PULL REQUEST:
# la pubblicazione avviene solo al merge (umano nel loop, mai in automatico).
#
# Prerequisiti (Settings del repo):
# - Secrets → Actions → GEMINI_API_KEY
# - Actions → General → "Allow GitHub Actions to create and approve pull requests"
name: Tech Radar

on:
  schedule:
    # Lunedì e giovedì alle 06:00 UTC (~2 volte a settimana).
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tech-radar
  cancel-in-progress: false

jobs:
  propose-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # Lo script di generazione resta zero-dipendenze (fetch nativa).
      - name: Genera le card proposte
        run: node scripts/radar/generate.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY_PATH: ${{ runner.temp }}/radar-pr-body.md

      # Se ci sono card nuove, rigenera l'indice del chatbot NELLA STESSA PR:
      # al merge arriva tutto coerente e il gate rag:check della CI resta verde
      # (prima ogni merge di card lasciava l'indice stale, da rigenerare a mano).
      - name: Rigenera l'indice RAG se ci sono card nuove
        run: |
          if [ -n "$(git status --porcelain src/content/radar)" ]; then
            npm ci
            npx tsx scripts/rag/build-index.ts
          else
            echo "Nessuna card nuova: indice invariato."
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Se lo script non ha scritto card (nulla di nuovo), non crea nessuna PR.
      - name: Apri la Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            src/content/radar/*.md
            src/rag/index.json
          branch: radar/proposte
          delete-branch: true
          commit-message: 'radar: nuove card proposte dalla pipeline'
          title: '📡 Tech Radar — nuove card da approvare'
          body-path: ${{ runner.temp }}/radar-pr-body.md
          labels: tech-radar
